name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      cms_job_id:
        description: "CMS deployment job id"
        required: false
        type: string

concurrency:
  group: cloudflare-pages-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write Wrangler env file
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          {
            printf 'CLOUDFLARE_ACCOUNT_ID=%s\n' "${CLOUDFLARE_ACCOUNT_ID}"
            printf 'CLOUDFLARE_API_TOKEN=%s\n' "${CLOUDFLARE_API_TOKEN}"
            printf 'CLOUDFLARE_D1_DATABASE_ID=%s\n' "${CLOUDFLARE_D1_DATABASE_ID}"
          } > .env

      - name: Build and deploy
        run: npm run deploy:cf:prod:cms

      - name: Report deployment status back to CMS
        if: always() && github.event_name == 'workflow_dispatch' && inputs.cms_job_id != ''
        shell: bash
        env:
          CALLBACK_TOKEN: ${{ secrets.CMS_DEPLOY_CALLBACK_TOKEN }}
          CMS_JOB_ID: ${{ inputs.cms_job_id }}
          DEPLOY_STATUS: ${{ job.status }}
          PRODUCTION_URL: ${{ secrets.CLOUDFLARE_PRODUCTION_URL }}
        run: |
          if [ -z "${CALLBACK_TOKEN}" ] || [ -z "${PRODUCTION_URL}" ]; then
            echo "Skipping CMS callback because the callback configuration is missing."
            exit 0
          fi

          if [ "${DEPLOY_STATUS}" = "success" ]; then
            STATUS="success"
            MESSAGE="Cloudflare Pages deployment completed."
          elif [ "${DEPLOY_STATUS}" = "cancelled" ]; then
            STATUS="failed"
            MESSAGE="Cloudflare Pages deployment was cancelled."
          else
            STATUS="failed"
            MESSAGE="Cloudflare Pages deployment failed."
          fi

          export STATUS MESSAGE PRODUCTION_URL
          PAYLOAD="$(node -e 'const payload = { status: process.env.STATUS, message: process.env.MESSAGE, deploymentUrl: process.env.PRODUCTION_URL.replace(/\/$/, "") }; process.stdout.write(JSON.stringify(payload));')"

          curl --fail-with-body --silent --show-error \
            -X POST "${PRODUCTION_URL%/}/api/jobs/${CMS_JOB_ID}/complete" \
            -H "authorization: Bearer ${CALLBACK_TOKEN}" \
            -H "content-type: application/json" \
            --data "${PAYLOAD}"
